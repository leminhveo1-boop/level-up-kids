# Cloudflare Pages config for Level Up Kids (Next.js via @cloudflare/next-on-pages)
name = "level-up-kids"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Secrets (set via `wrangler pages secret put <NAME>` or CF dashboard — NEVER commit values):
#   SUPABASE_SERVICE_ROLE_KEY
#   SEPAY_WEBHOOK_API_KEY
# Plain vars (CF dashboard > Pages > Settings > Environment variables):
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   PREMIUM_PRICE_VND, PREMIUM_DAYS_PER_PERIOD, NEXT_PUBLIC_PREMIUM_PRICE_VND,
#   NEXT_PUBLIC_BANK_ID, NEXT_PUBLIC_BANK_ACCOUNT, NEXT_PUBLIC_BANK_HOLDER
