<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level Up Kids — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FDFBF7;
      color: #1B5E20;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .emoji { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #666; max-width: 300px; line-height: 1.5; }
    button {
      margin-top: 20px;
      background: #2E7D32;
      color: #FDFBF7;
      border: none;
      padding: 12px 32px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="emoji">🌳</div>
  <h1>Không có kết nối mạng!</h1>
  <p>Dũng sĩ ơi, mạng đang tạm gián đoạn. Tiến trình của con vẫn được lưu an toàn trên máy — thử tải lại nhé!</p>
  <button onclick="location.reload()">TẢI LẠI 🔄</button>
</body>
</html>
